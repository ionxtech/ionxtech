<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ionXtech</title>
    <meta name="description" content="Contact ionXtech.">
    <link rel="icon" type="image/png" href="/assets/images/IonXtech.webp">
    <link rel="stylesheet" href="assets/css/style.css">
<script>if(localStorage.getItem('theme')==='dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.setAttribute('data-theme', 'dark');}</script>
</head>
<body>
    <header></header>
    <main id="main" class="container" style="margin-top:40px;">
        <h1>Contact Us</h1>
        <div class="card" style="margin-top:20px;">
            <h3>Head Office</h3>
            <p>Anoop Nagar<br>Indore, Madhya Pradesh- 452018</p>
        </div>
        <div class="card" style="margin-top:30px;">
            <h3>Send us a message</h3>
            <p style="margin-bottom: 20px; color: var(--text-light);">Have a question or want to work with us? Fill out the form below.</p>
            <form action="https://formspree.io/f/placeholder" method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">Name</label>
                    <input class="form-input" type="text" id="name" name="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
                    <textarea class="form-textarea" id="message" name="message" required placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%; border:none; cursor:pointer;">Send Message</button>
            </form>
        </div>
    </main>
    <footer></footer>
    <script src="assets/js/layout.js"></script>
</body>
</html>
